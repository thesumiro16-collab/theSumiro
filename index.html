<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/The Sumiro Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>The Sumiro — Premium Fabric Designs from Surat, India</title>
    <meta name="description" content="The Sumiro crafts premium silk brocades, jacquard weaves, and artisanal embroideries from Surat, India. Bespoke fabric designs blending heritage craftsmanship with modern looms since 2003." />
    <meta name="keywords" content="fabric design, silk brocade, jacquard weave, zari embroidery, Surat textiles, premium fabrics India, custom fabric manufacturer, The Sumiro" />
    <meta name="author" content="The Sumiro" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#E8890C" />
    <meta name="google-site-verification" content="N7yk9uw7RrScjpIep5-JQL2QrXxXd1pKWhx5mRha61Y" />
    <link rel="canonical" href="https://thesumiro.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The Sumiro" />
    <meta property="og:title" content="The Sumiro — Premium Fabric Designs from Surat, India" />
    <meta property="og:description" content="Premium silk brocades, jacquard weaves, and artisanal embroideries crafted in Surat, India. Heritage craftsmanship meets modern precision." />
    <meta property="og:url" content="https://thesumiro.com/" />
    <meta property="og:image" content="https://thesumiro.com/The%20Sumiro%20Logo.png" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Sumiro — Premium Fabric Designs from Surat, India" />
    <meta name="twitter:description" content="Premium silk brocades, jacquard weaves, and artisanal embroideries crafted in Surat, India." />
    <meta name="twitter:image" content="https://thesumiro.com/The%20Sumiro%20Logo.png" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "The Sumiro",
      "url": "https://thesumiro.com",
      "logo": "https://thesumiro.com/The%20Sumiro%20Logo.png",
      "description": "Premium fabric design factory specializing in silk brocades, jacquard weaves, and artisanal embroideries.",
      "foundingDate": "2003",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "34-40, Hari Om Industrial Estate, Saroli, Kumbharia Gam",
        "addressLocality": "Surat",
        "addressRegion": "Gujarat",
        "postalCode": "395010",
        "addressCountry": "IN"
      }
    }
    </script>

    <!-- Preconnect to font CDN at highest priority -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload hero logo (LCP critical) -->
    <link rel="preload" as="image" href="/The Sumiro Logo.png" fetchpriority="high" />

    <!-- Google Fonts — trimmed to only used weights for faster download -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Prevent FOUC with fallback font stack while Google Fonts load -->
    <style>
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      /* Minimal spinner keyframe for lazy-load fallback */
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
